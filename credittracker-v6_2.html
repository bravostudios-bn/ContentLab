<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentLab Credit Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e63946;
            --primary-light: #f07a7f;
            --primary-dark: #c91b2a;
            --accent: #f77f88;
            --bg: #f5f5f5;
            --surface: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #5a5a5a;
            --border: #e0e0e0;
            --success: #06a77d;
            --warning: #d4941e;
            --error: #c91b2a;
        }

        body {
            background: linear-gradient(135deg, #f5f5f5 0%, #fafafa 100%);
            color: var(--text-primary);
            font-family: 'Geist', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header with Logo */
        header {
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .logo-container {
            height: 50px;
        }

        .logo-container img {
            height: 100%;
            object-fit: contain;
        }

        .header-text h1 {
            font-family: 'Geist', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.3s ease;
        }

        .panel:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .panel-title {
            font-family: 'Geist', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
            text-transform: none;
            letter-spacing: -0.3px;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 700;
        }

        input, select, textarea {
            width: 100%;
            background: var(--bg);
            border: 1.5px solid var(--border);
            color: var(--text-primary);
            padding: 12px 14px;
            font-family: 'Geist', sans-serif;
            font-size: 14px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.1);
            background: var(--surface);
        }

        input::placeholder {
            color: #b0b0b0;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
            font-family: 'Geist', sans-serif;
        }

        /* Buttons */
        button {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 13px 24px;
            font-family: 'Geist', sans-serif;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(230, 57, 70, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text-primary);
            border: 1.5px solid var(--border);
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: var(--border);
            box-shadow: none;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--error) 0%, #a01620 100%);
            margin-top: 10px;
        }

        /* Search Bar */
        .search-bar {
            position: relative;
            margin-bottom: 20px;
        }

        .search-bar input {
            padding-left: 36px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Clients List */
        .clients-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 600px;
            overflow-y: auto;
        }

        .client-item {
            background: var(--bg);
            border: 1.5px solid var(--border);
            padding: 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .client-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(230, 57, 70, 0.15);
            transform: translateX(4px);
        }

        .client-item.active {
            border-color: var(--primary);
            background: rgba(230, 57, 70, 0.08);
            box-shadow: 0 4px 12px rgba(230, 57, 70, 0.2);
        }

        .client-name {
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .client-meta {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.5;
            font-weight: 400;
        }

        /* Dashboard */
        .dashboard-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .contract-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(230, 57, 70, 0.25);
            position: relative;
            overflow: hidden;
        }

        .contract-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .contract-header > * {
            position: relative;
            z-index: 1;
        }

        .contract-title {
            font-family: 'Geist', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .contract-details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .contract-detail {
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding-right: 24px;
        }

        .contract-detail:last-child {
            border-right: none;
        }

        .detail-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.85;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .detail-value {
            font-family: 'Geist', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* Month Selector */
        .month-selector {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .month-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            font-weight: 700;
        }

        .month-tabs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
            gap: 8px;
        }

        .month-tab {
            background: var(--bg);
            border: 1.5px solid var(--border);
            padding: 11px;
            cursor: pointer;
            font-size: 11px;
            text-align: center;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .month-tab:hover {
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(230, 57, 70, 0.15);
        }

        .month-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(230, 57, 70, 0.3);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .stat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .stat-box:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 16px rgba(230, 57, 70, 0.15);
            transform: translateY(-4px);
        }

        .stat-box:hover::before {
            opacity: 1;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .stat-value {
            font-family: 'Geist', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        /* Progress Bar */
        .progress-container {
            margin: 24px 0;
        }

        .progress-bar {
            height: 10px;
            background: var(--border);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.06);
        }

        .progress-fill {
            height: 100%;
            transition: width 0.4s ease;
            border-radius: 6px;
        }

        .progress-fill.success { background: linear-gradient(90deg, var(--success), #00d9a3); }
        .progress-fill.warning { background: linear-gradient(90deg, var(--warning), #f5b800); }
        .progress-fill.error { background: linear-gradient(90deg, var(--error), #ff6b7a); }

        /* Content Types */
        .content-types {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .content-type-header {
            font-family: 'Geist', sans-serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .content-type-row {
            display: grid;
            grid-template-columns: 1.8fr 80px 80px 110px;
            gap: 16px;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }

        .content-type-row:last-child {
            border-bottom: none;
        }

        .content-type-row label {
            margin: 0;
            text-transform: none;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 700;
        }

        .content-type-row input {
            margin: 0;
            padding: 10px 12px;
            text-align: center;
            font-size: 13px;
        }

        .credit-cost {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            font-weight: 700;
        }

        .credit-display {
            text-align: right;
            font-weight: 700;
            color: var(--primary);
            font-size: 14px;
            font-family: 'Geist Mono', monospace;
        }

        /* Other Content Description */
        .other-content-section {
            background: rgba(230, 57, 70, 0.05);
            border: 1.5px solid rgba(230, 57, 70, 0.2);
            padding: 18px;
            border-radius: 8px;
            margin-top: 16px;
        }

        .other-content-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .other-content-section textarea {
            font-size: 12px;
        }

        /* Summary */
        .summary-section {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .summary-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .summary-label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 700;
        }

        .summary-value {
            text-align: right;
            font-weight: 700;
            font-size: 13px;
            color: var(--text-primary);
            font-family: 'Geist Mono', monospace;
        }

        /* Output Section */
        .output-section {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 32px;
            border-radius: 12px;
            margin-top: 40px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .output-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .output-text {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 20px;
            font-size: 12px;
            line-height: 1.7;
            min-height: 280px;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text-primary);
            border-radius: 8px;
            font-family: 'Geist Mono', monospace;
        }

        .no-client {
            color: var(--text-secondary);
            text-align: center;
            padding: 80px 20px;
            font-size: 15px;
        }

        .success-message {
            background: linear-gradient(135deg, var(--success), #00d9a3);
            color: white;
            padding: 14px 18px;
            margin-top: 14px;
            font-size: 12px;
            text-align: center;
            border-radius: 8px;
            display: none;
            animation: slideDown 0.3s ease;
            font-weight: 700;
        }

        .success-message.show {
            display: block;
            animation: fadeOut 2s ease-in-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; }
        }

        .plan-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 6px 12px;
            font-weight: 700;
            font-size: 11px;
            border-radius: 6px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .contract-details {
                grid-template-columns: repeat(2, 1fr);
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .content-type-row {
                grid-template-columns: 1fr;
            }

            .output-buttons {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px 15px;
            }

            header h1 {
                font-size: 28px;
            }

            .contract-details {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <div class="logo-container">
                    <img id="logo" src="" alt="Bravo Studios Logo">
                </div>
                <div class="header-text">
                    <h1>ContentLab Tracker</h1>
                    <div class="header-subtitle">Credit Management System</div>
                </div>
            </div>
        </header>

        <div class="main-grid">
            <!-- LEFT: Client Management -->
            <div class="panel">
                <div class="panel-title">New Client</div>
                
                <div class="form-group">
                    <label>Client Name</label>
                    <input type="text" id="clientName" placeholder="DPMM FC">
                </div>

                <div class="form-group">
                    <label>ContentLab Plan</label>
                    <select id="planType">
                        <option value="">Select Plan</option>
                        <optgroup label="Standard Plans">
                            <option value="starter">Starter (10 cr/month)</option>
                            <option value="growth">Growth (20 cr/month)</option>
                            <option value="pro">Pro (33 cr/month)</option>
                        </optgroup>
                        <optgroup label="Lite Plans">
                            <option value="starter-lite">Starter Lite (10 cr/month)</option>
                            <option value="growth-lite">Growth Lite (20 cr/month)</option>
                            <option value="pro-lite">Pro Lite (33 cr/month)</option>
                        </optgroup>
                        <optgroup label="Trial">
                            <option value="trial">Trial (6 credits, one-time)</option>
                        </optgroup>
                    </select>
                    <div id="planInfo" style="margin-top: 10px;"></div>
                </div>

                <div class="form-group">
                    <label>Contract Start Date</label>
                    <input type="date" id="startDate">
                </div>

                <div class="form-group">
                    <label>Contract Duration (months)</label>
                    <input type="number" id="contractDuration" placeholder="12" value="12" min="1">
                </div>

                <button onclick="addClient()">+ Add Client</button>

                <div style="margin-top: 32px; border-top: 1px solid var(--border); padding-top: 28px;">
                    <div class="panel-title">Active Clients</div>
                    <div class="search-bar">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="clientSearch" placeholder="Search..." onkeyup="filterClients()">
                    </div>
                    <div class="clients-list" id="clientsList"></div>
                </div>
            </div>

            <!-- RIGHT: Dashboard -->
            <div id="dashboardContent" class="no-client">
                <p>Select a client to begin tracking credits</p>
            </div>
        </div>

        <!-- Output Section -->
        <div class="output-section" id="outputSection" style="display: none;">
            <div class="panel-title">Monthly Report</div>
            <div class="output-buttons">
                <button onclick="copyToClipboard()">📋 Copy Invoice Text</button>
                <button class="btn-secondary" onclick="archiveMonth()">✓ Archive Month</button>
            </div>
            <div class="output-text" id="emailOutput"></div>
            <div class="success-message" id="successMessage">✓ Copied to clipboard</div>
        </div>
    </div>

    <script>
        const CREDIT_COSTS = {
            'Long Reel (1–1:30 min)': 1.5,
            'Short Reel (30 sec max)': 0.5,
            'Highlight Video Coverage': 2,
            'Photo Session': 2,
            'Poster': 0.5,
            'Live Update (Physical)': 2.5,
            'Live Update (Remote)': 0.5,
            'Other': 1
        };

        const PLANS = {
            'starter': { name: 'Starter', credits: 10, price: 850, lite: false, trial: false },
            'growth': { name: 'Growth', credits: 20, price: 1550, lite: false, trial: false },
            'pro': { name: 'Pro', credits: 33, price: 2310, lite: false, trial: false },
            'starter-lite': { name: 'Starter Lite', credits: 10, price: 935, lite: true, trial: false },
            'growth-lite': { name: 'Growth Lite', credits: 20, price: 1705, lite: true, trial: false },
            'pro-lite': { name: 'Pro Lite', credits: 33, price: 2541, lite: true, trial: false },
            'trial': { name: 'Trial', credits: 6, price: 0, lite: false, trial: true }
        };

        const CONTENT_TYPES = Object.keys(CREDIT_COSTS);

        let clients = JSON.parse(localStorage.getItem('contentlabClientsV6')) || [];
        let activeClientId = null;
        let activeMonth = null;

        function updatePlanInfo() {
            const planType = document.getElementById('planType').value;
            if (!planType) {
                document.getElementById('planInfo').innerHTML = '';
                return;
            }
            const plan = PLANS[planType];
            let badge = plan.name;
            if (plan.lite) badge += ' (Lite)';
            if (plan.trial) badge += ' (Trial)';
            
            const duration = parseInt(document.getElementById('contractDuration').value) || 12;
            const totalCredits = plan.credits * duration;
            
            document.getElementById('planInfo').innerHTML = `
                <div class="plan-badge">${badge}</div>
                <div style="font-size: 12px; color: var(--text-secondary);">
                    ${plan.credits} cr/month × ${duration} months = ${totalCredits} total<br>
                    ${!plan.trial ? `BND ${plan.price}/month` : 'Free'}
                </div>
            `;
        }

        // Update plan info when duration changes
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('contractDuration').addEventListener('change', updatePlanInfo);
        });

        function getMonthsBetween(start, end) {
            const months = [];
            const current = new Date(start);
            while (current <= end) {
                months.push(new Date(current));
                current.setMonth(current.getMonth() + 1);
            }
            return months;
        }

        function formatMonthLabel(date) {
            return date.toLocaleString('default', { month: 'short', year: 'numeric' }).toUpperCase();
        }

        function addClient() {
            const name = document.getElementById('clientName').value.trim();
            const planType = document.getElementById('planType').value;
            const startDate = new Date(document.getElementById('startDate').value);
            const duration = parseInt(document.getElementById('contractDuration').value) || 12;

            if (!name || !planType || !startDate) {
                alert('Please fill all fields');
                return;
            }

            const plan = PLANS[planType];
            const endDate = new Date(startDate);
            endDate.setMonth(endDate.getMonth() + duration);

            const monthsList = getMonthsBetween(startDate, endDate);
            const monthlyRecords = {};

            monthsList.forEach((date, idx) => {
                const key = formatMonthLabel(date);
                
                monthlyRecords[key] = {
                    month: key,
                    date: date.toISOString(),
                    allocation: plan.credits,
                    usage: CONTENT_TYPES.reduce((acc, type) => ({ ...acc, [type]: 0 }), {}),
                    otherDescription: '',
                    monthNumber: idx + 1,
                    totalMonths: duration,
                    dateStart: date.toLocaleString('default', { month: 'short', day: 'numeric' })
                };
            });

            const client = {
                id: Date.now(),
                name,
                planType,
                plan: plan.name,
                credits: plan.credits,
                price: plan.price,
                lite: plan.lite,
                trial: plan.trial,
                startDate: startDate.toISOString(),
                endDate: endDate.toISOString(),
                duration,
                monthlyRecords,
                totalUsedAllTime: 0,
                totalCreditsContract: plan.credits * duration
            };

            clients.push(client);
            saveClients();
            clearAddForm();
            renderClientsList();
            selectClient(client.id, Object.keys(monthlyRecords)[0]);
        }

        function clearAddForm() {
            document.getElementById('clientName').value = '';
            document.getElementById('planType').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('contractDuration').value = '12';
            document.getElementById('planInfo').innerHTML = '';
        }

        function selectClient(id, month = null) {
            activeClientId = id;
            const client = clients.find(c => c.id === id);
            
            if (!month) {
                const now = new Date();
                const allMonths = Object.keys(client.monthlyRecords);
                for (let m of allMonths) {
                    const date = new Date(client.monthlyRecords[m].date);
                    if (date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth()) {
                        month = m;
                        break;
                    }
                }
                if (!month) month = allMonths[0];
            }
            
            activeMonth = month;
            renderClientsList();
            renderDashboard();
            loadLogoFromIndexedDB();
        }

        function deleteClient(id) {
            if (confirm('Delete this client? This action cannot be undone.')) {
                clients = clients.filter(c => c.id !== id);
                saveClients();
                if (activeClientId === id) {
                    activeClientId = null;
                    activeMonth = null;
                }
                renderClientsList();
                renderDashboard();
            }
        }

        function filterClients() {
            const searchTerm = document.getElementById('clientSearch').value.toLowerCase();
            const list = document.getElementById('clientsList');
            
            const filtered = clients.filter(c => c.name.toLowerCase().includes(searchTerm));
            
            list.innerHTML = filtered.map(c => {
                const isActive = activeClientId === c.id;
                const now = new Date();
                const start = new Date(c.startDate);
                const end = new Date(c.endDate);
                const daysRemaining = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
                
                return `
                    <div class="client-item ${isActive ? 'active' : ''}" onclick="selectClient(${c.id})">
                        <div class="client-name">${c.name}</div>
                        <div class="client-meta">
                            ${c.plan} • ${c.totalCreditsContract} cr total • ${c.trial ? 'Free' : `BND ${c.price}/mo`}<br>
                            ${daysRemaining > 0 ? `${daysRemaining} days left` : 'Contract ended'}
                        </div>
                        ${isActive ? `<button class="btn-danger" onclick="event.stopPropagation(); deleteClient(${c.id})" style="padding: 8px; font-size: 10px; margin-top: 10px;">Delete Client</button>` : ''}
                    </div>
                `;
            }).join('');
        }

        function renderClientsList() {
            filterClients();
        }

        function renderDashboard() {
            const content = document.getElementById('dashboardContent');
            const outputSection = document.getElementById('outputSection');

            if (!activeClientId || !activeMonth) {
                content.innerHTML = '<div class="no-client"><p>Select a client to begin tracking credits</p></div>';
                outputSection.style.display = 'none';
                return;
            }

            const client = clients.find(c => c.id === activeClientId);
            const month = client.monthlyRecords[activeMonth];
            const currentMonthUsed = Object.values(month.usage).reduce((acc, val) => acc + val, 0);
            const remaining = month.allocation - currentMonthUsed;
            const usagePercent = Math.round((currentMonthUsed / month.allocation) * 100);

            const now = new Date();
            const start = new Date(client.startDate);
            const end = new Date(client.endDate);
            const daysRemaining = Math.ceil((end - now) / (1000 * 60 * 60 * 24));

            const totalAllocated = client.totalCreditsContract;
            const totalUsedSoFar = client.totalUsedAllTime + currentMonthUsed;
            const totalRemaining = totalAllocated - totalUsedSoFar;

            const progressColor = usagePercent > 100 ? 'error' : usagePercent > 80 ? 'warning' : 'success';

            content.innerHTML = `
                <div class="dashboard-content">
                    <div class="contract-header">
                        <div class="contract-title">${client.name}</div>
                        <div class="contract-details">
                            <div class="contract-detail">
                                <div class="detail-label">Plan</div>
                                <div class="detail-value">${client.plan}</div>
                            </div>
                            <div class="contract-detail">
                                <div class="detail-label">Status</div>
                                <div class="detail-value">${month.dateStart} – ${month.monthNumber}/${month.totalMonths}</div>
                            </div>
                            <div class="contract-detail">
                                <div class="detail-label">Credits Left</div>
                                <div class="detail-value" style="color: ${totalRemaining < 0 ? '#ff6b7a' : '#ffffff'}">${totalRemaining.toFixed(1)}</div>
                            </div>
                            <div class="contract-detail">
                                <div class="detail-label">Days Remaining</div>
                                <div class="detail-value">${daysRemaining > 0 ? daysRemaining : '—'}</div>
                            </div>
                        </div>
                    </div>

                    <div class="month-selector">
                        <div class="month-label">Select Month</div>
                        <div class="month-tabs">
                            ${Object.keys(client.monthlyRecords).map(m => `
                                <div class="month-tab ${activeMonth === m ? 'active' : ''}" onclick="selectClient(${client.id}, '${m}')">
                                    ${m}
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-label">Allocated This Month</div>
                            <div class="stat-value">${month.allocation}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Used This Month</div>
                            <div class="stat-value">${currentMonthUsed.toFixed(1)}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Total Contract Used</div>
                            <div class="stat-value">${totalUsedSoFar.toFixed(1)}</div>
                        </div>
                        <div class="stat-box" style="border: 1.5px solid var(--primary);">
                            <div class="stat-label">Usage</div>
                            <div class="stat-value">${usagePercent}%</div>
                        </div>
                    </div>

                    <div class="progress-container">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; font-weight: 700;">
                            <span>Monthly Progress</span>
                            <span style="color: var(--primary);">${currentMonthUsed.toFixed(1)} / ${month.allocation} cr</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${progressColor}" style="width: ${Math.min(usagePercent, 100)}%"></div>
                        </div>
                    </div>

                    <div class="content-types">
                        <div class="content-type-header">Content Types</div>
                        ${CONTENT_TYPES.filter(t => t !== 'Other').map(type => {
                            const quantity = month.usage[type] || 0;
                            const credits = quantity * CREDIT_COSTS[type];
                            return `
                                <div class="content-type-row">
                                    <label>${type}</label>
                                    <div class="credit-cost">${CREDIT_COSTS[type]} cr</div>
                                    <input type="number" min="0" value="${quantity}" onchange="updateUsage('${type}', this.value)" placeholder="0">
                                    <div class="credit-display">${credits.toFixed(1)}</div>
                                </div>
                            `;
                        }).join('')}
                        
                        <div class="content-type-row">
                            <label>Other</label>
                            <div class="credit-cost">1 cr</div>
                            <input type="number" min="0" value="${month.usage['Other'] || 0}" onchange="updateUsage('Other', this.value)" placeholder="0">
                            <div class="credit-display">${((month.usage['Other'] || 0) * 1).toFixed(1)}</div>
                        </div>
                        
                        <div class="other-content-section">
                            <div class="other-content-label">Other Content Description</div>
                            <textarea id="otherDesc" placeholder="Describe the other content used..." onchange="updateOtherDescription()">${month.otherDescription || ''}</textarea>
                        </div>
                    </div>

                    <div class="summary-section">
                        <div class="summary-row">
                            <div class="summary-label">This Month Used</div>
                            <div class="summary-value">${currentMonthUsed.toFixed(1)} / ${month.allocation} credits</div>
                        </div>
                        <div class="summary-row">
                            <div class="summary-label">Contract Used So Far</div>
                            <div class="summary-value">${totalUsedSoFar.toFixed(1)} / ${totalAllocated}</div>
                        </div>
                        <div class="summary-row">
                            <div class="summary-label">Credits Remaining</div>
                            <div class="summary-value" style="color: ${totalRemaining < 0 ? 'var(--error)' : 'var(--text-primary)'}">${totalRemaining.toFixed(1)} credits</div>
                        </div>
                    </div>
                </div>
            `;

            outputSection.style.display = 'block';
            generateEmailText();
            saveClients();
        }

        function updateUsage(type, value) {
            if (!activeClientId || !activeMonth) return;
            const client = clients.find(c => c.id === activeClientId);
            const month = client.monthlyRecords[activeMonth];
            month.usage[type] = parseInt(value) || 0;
            saveClients();
            renderDashboard();
        }

        function updateOtherDescription() {
            if (!activeClientId || !activeMonth) return;
            const client = clients.find(c => c.id === activeClientId);
            const month = client.monthlyRecords[activeMonth];
            month.otherDescription = document.getElementById('otherDesc').value;
            saveClients();
            generateEmailText();
        }

        function generateEmailText() {
            if (!activeClientId || !activeMonth) return;
            const client = clients.find(c => c.id === activeClientId);
            const month = client.monthlyRecords[activeMonth];
            const currentMonthUsed = Object.values(month.usage).reduce((acc, val) => acc + val, 0);
            
            let usageBreakdown = CONTENT_TYPES
                .filter(type => month.usage[type] > 0)
                .map(type => {
                    const qty = month.usage[type];
                    const credits = qty * CREDIT_COSTS[type];
                    if (type === 'Other' && month.otherDescription) {
                        return `${type} (${month.otherDescription}): ${qty} × ${CREDIT_COSTS[type]} = ${credits.toFixed(1)} credits`;
                    }
                    return `${type}: ${qty} × ${CREDIT_COSTS[type]} = ${credits.toFixed(1)} credits`;
                })
                .join('\n');

            const prevMonthDate = new Date(month.date);
            prevMonthDate.setMonth(prevMonthDate.getMonth() - 1);
            const prevMonth = prevMonthDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            const currentMonthDisplay = new Date(month.date).toLocaleString('default', { month: 'long', year: 'numeric' });

            const emailText = `Assalamualaikum Tuan,

Attached is the invoice for ${currentMonthDisplay}, amounting to BND ${client.price}, under our ContentLab ${client.plan} service with ${client.name}. The payment is due by the 3rd of ${currentMonthDisplay}, representing Month ${month.monthNumber} of ${month.totalMonths} in the agreed contract period.

Credit Usage for ${prevMonth}:

${usageBreakdown || '(No content recorded)'}

Credits Used (${prevMonth}): ${currentMonthUsed.toFixed(1)}
Total Credits Used (Contract to date): ${client.totalUsedAllTime + currentMonthUsed}
Total Contract Allocation: ${client.totalCreditsContract}

Please find the invoice attached for your reference.

Should you require any clarification, please let us know.`;

            document.getElementById('emailOutput').textContent = emailText;
        }

        function copyToClipboard() {
            const text = document.getElementById('emailOutput').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const msg = document.getElementById('successMessage');
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 2000);
            });
        }

        function archiveMonth() {
            if (!activeClientId || !activeMonth) return;
            const client = clients.find(c => c.id === activeClientId);
            const month = client.monthlyRecords[activeMonth];
            const currentMonthUsed = Object.values(month.usage).reduce((acc, val) => acc + val, 0);
            
            if (confirm(`Archive ${activeMonth} (${currentMonthUsed.toFixed(1)} credits used)?`)) {
                client.totalUsedAllTime += currentMonthUsed;
                const months = Object.keys(client.monthlyRecords);
                const currentIdx = months.indexOf(activeMonth);
                if (currentIdx < months.length - 1) {
                    selectClient(activeClientId, months[currentIdx + 1]);
                }
                saveClients();
            }
        }

        function saveClients() {
            localStorage.setItem('contentlabClientsV6', JSON.stringify(clients));
        }

        function loadLogoFromIndexedDB() {
            const logoImg = document.getElementById('logo');
            const storedLogo = localStorage.getItem('bravoLogo');
            if (storedLogo) {
                logoImg.src = storedLogo;
            }
        }

        // Handle logo upload
        document.addEventListener('DOMContentLoaded', function() {
            loadLogoFromIndexedDB();
            
            const logoContainer = document.querySelector('.logo-container');
            
            logoContainer.style.cursor = 'pointer';
            logoContainer.title = 'Click to upload Bravo Studios logo';
            
            logoContainer.addEventListener('click', function() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            const logoData = event.target.result;
                            localStorage.setItem('bravoLogo', logoData);
                            document.getElementById('logo').src = logoData;
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            });
        });

        renderClientsList();
        renderDashboard();
    </script>
</body>
</html>
